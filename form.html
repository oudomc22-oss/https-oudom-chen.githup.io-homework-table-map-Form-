<html lang="en">
<head>

    <title>Document</title>
     <style>
        body{
            font-family: Arial, sans-serif;
        }

        fieldset{
            margin-bottom: 15px;
            padding: 15px;
        }

        input, select{
            margin-bottom: 20px;
        }

        .btn-group{
            text-align: center; /* Center buttons */
            margin-top: 20px;
        }

        .btn-group button{
            width: 120px;
            padding: 10px;
            border: none;
            color: white;
            cursor: pointer;
            margin: 0 10px;
        }

        .submit-btn{
            background-color: darkgreen;
        }

        .reset-btn{
            background-color: red;
        }
    </style>
     
</head>

        <fieldset>
